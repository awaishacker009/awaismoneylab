<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awais Money Lab | Earn Real Cash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <h1>AWAIS MONEY LAB</h1>
        <p>The Most Trusted Earning Platform in Pakistan</p>
        <div class="auth-card">
            <h2 id="auth-title">Login / Register</h2>
            <input type="email" id="email" placeholder="Enter Email">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="handleAuth()" class="btn-main">Get Started</button>
        </div>
        <div class="info-links">
            <a href="https://whatsapp.com/channel/0029VbCVrZhA89MnqofUx70D">Join WhatsApp Channel</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        if(refId) localStorage.setItem('referredBy', refId);

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Please fill all fields");

            auth.signInWithEmailAndPassword(email, pass)
            .then(() => window.location.href="dashboard.html")
            .catch(() => {
                auth.createUserWithEmailAndPassword(email, pass)
                .then((res) => {
                    db.collection("users").doc(res.user.uid).set({
                        email: email,
                        points: 100, // Welcome Bonus
                        referredBy: localStorage.getItem('referredBy') || "Direct",
                        wallet: 0
                    }).then(() => window.location.href="dashboard.html");
                }).catch(err => alert(err.message));
            });
        }
    </script>
</body>
</html>
