<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Awais Money Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Awais Money Lab</h1>
        <div id="login-form">
            <input type="email" id="email" placeholder="ای میل">
            <input type="password" id="password" placeholder="پاس ورڈ">
            <button onclick="signIn()">لاگ ان کریں</button>
            <p onclick="toggleForm()">نیا اکاؤنٹ بنائیں</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        function signIn() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => window.location.href = "dashboard.html")
                .catch(err => alert(err.message));
        }
        // سائن اپ کا فنکشن بھی یہاں ایڈ ہوگا
    </script>
</body>
  </html>
