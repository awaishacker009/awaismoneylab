<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin - Awais Money Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000; color: #fff;">
    <h1>Admin Panel (AWAIS MONEY LAB)</h1>
    <div id="users-list">Loading users...</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if(user.email !== "awaismayooo4568@gmail.com") {
                alert("Access Denied!");
                window.location.href="dashboard.html";
            } else {
                db.collection("users").get().then(snapshot => {
                    let html = "<table border='1'><tr><th>Email</th><th>Points</th><th>Referrer</th></tr>";
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        html += `<tr><td>${d.email}</td><td>${d.points}</td><td>${d.referredBy}</td></tr>`;
                    });
                    html += "</table>";
                    document.getElementById('users-list').innerHTML = html;
                });
            }
        });
    </script>
</body>
</html>
